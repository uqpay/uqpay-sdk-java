name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -DSKIP_INTEGRATION_TESTS=true
        env:
          SKIP_INTEGRATION_TESTS: "true"

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### Installation

            **Maven:**
            ```xml
            <dependency>
                <groupId>com.uqpay.sdk</groupId>
                <artifactId>uqpay-sdk-java</artifactId>
                <version>${{ steps.version.outputs.VERSION }}</version>
            </dependency>
            ```

            **Gradle:**
            ```groovy
            implementation 'com.uqpay.sdk:uqpay-sdk-java:${{ steps.version.outputs.VERSION }}'
            ```

            ### Documentation
            See [README.md](https://github.com/uqpay/uqpay-sdk-java/blob/develop/README.md) for usage instructions.
          files: target/uqpay-sdk-java-*.jar
          draft: false
          prerelease: false
